version: '3.8'

services:
  codenebula:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ${PROJECT_PATH:-./sample_project}
        target: /project
    environment:
      - WATCH_PATH=/project
    stdin_open: true
    tty: true
    command: python -m backend.main --path /project
