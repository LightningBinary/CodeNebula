version: '3.8'

services:
  codenebula:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ${PROJECT_PATH:-./sample_project}
        target: /project
    environment:
      - WATCH_PATH=/project
      - PYTHONPATH=/app
    stdin_open: true
    tty: true
    command: python backend/main.py --path /project
